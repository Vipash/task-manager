<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title> Dashboard </title>
    </head>
    <body class="dashboard-page">
        <header class="main-header">
            <h1>Task Manager Dashboard</h1>
            <button id="logout-btn">Logout</button>
        </header>
        
        <main class="dashboard-content">
            <section class="task-form-card">
                <h3>Create a New Task</h3>
                <form id="task-creation-form">
                    <div id ="error-message" 
                    style="color: #dc3545; font-size: 0.9rem; margin-bottom: 10px; min-height: 20px;">
                    </div>
                    <div class="form-group">
                        <label for="task">Task Name</label>
                        <input type="text" id="task" placeholder="e.g. Learn CSS" required>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">Priority Level:</label>
                        <select id="task-priority">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="save-task-btn">Save Task</button>
                </form>
            </section>

            <section class="task-list-container">
                <h3>Your Tasks</h3>
                <div class="dashboard-controls"
                style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                    <div class="filter-group" style="display: flex; gap: 5px;">
                        <button class="filter-btn active-filter" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="completed">Completed</button>
                    </div>
                    <div class="sort-group">
                        <label for="sort-select" style="font-size: 0.9rem; font-weight: bold; margin-right: 5px;">Sort By:</label>
                        <select id="sort-select" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                            <option value="none">None (Default)</option>
                            <option value="priority-desc">Priority: High to Low</option>
                            <option value="priority-asc">Priority: Low to High</option>
                        </select>
                    </div>    
                </div>
                <div id="tasks-container">
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title> Dashboard </title>
    </head>
    <body class="dashboard-page">
        <header class="main-header">
            <h1>Task Manager Dashboard</h1>
            <button id="logout-btn">Logout</button>
        </header>
        
        <main class="dashboard-content">
            <section class="task-form-card">
                <h3>Create a New Task</h3>
                <form id="task-creation-form">
                    <div class="form-group">
                        <label for="task">Task Name</label>
                        <input type="text" id="task" placeholder="e.g. Learn CSS" required>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">Priority Level:</label>
                        <select id="task-priority">
                            <option value="low">Low Priority</option>
                            <option value="medium">Medium Priority</option>
                            <option value="high">High Priority</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="save-task-btn">Save Task</button>
                </form>
            </section>

            <section class="task-list-container">
                <h3>Your Tasks</h3>
                <div id="tasks-container">
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
</html>
